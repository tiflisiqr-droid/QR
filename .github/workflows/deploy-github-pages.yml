name: Deploy to GitHub Pages

# Builds Vite dist (base /QR/) and pushes it to branch `gh-pages`.
# In repo Settings → Pages: choose "Deploy from a branch" → Branch gh-pages, folder / (root).
#
# Supabase (სავალდებულო სხვა მოწყობილობებზე იგივე მენიუსთვის):
# Repo → Settings → Secrets and variables → Actions → New repository secret:
#   VITE_SUPABASE_URL      = https://xxxx.supabase.co
#   VITE_SUPABASE_ANON_KEY = (anon / publishable key)
# Vite ჩასვამს მათ bundle-ში build დროს — ლოკალური .env.local GitHub-ზე არ მოდის.

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install and build
        run: |
          npm ci
          npm run build
        env:
          GITHUB_ACTIONS: "true"
          GITHUB_REPOSITORY: ${{ github.repository }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          # ყოველ workflow run-ზე იცვლება → Vite bundle-ის hash იცვლება → CDN ძველ JS-ს ნაკლებად „აკრავს“.
          VITE_DEPLOY_STAMP: ${{ github.run_id }}-${{ github.sha }}

      # peaceiris/actions-gh-pages sporadically failed to download on Actions runners; JamesIves is equivalent.
      - name: Publish dist to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4.8.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: gh-pages
          folder: dist
          clean: true
          single-commit: true
